<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Multi-System Character Manager</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: auto; }
        
        .char-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .char-image { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); background: #ddd; flex-shrink: 0; }
        .char-info-text { flex-grow: 1; }
        
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .status-item { border: 1px solid #ddd; padding: 12px; border-radius: 6px; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center; }
        
        .calc-status-container { border-top: 2px solid #eee; margin-top: 20px; padding-top: 15px; }
        .calc-item { background: #fff; border: 1px dashed #bbb; margin-bottom: 8px; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        
        .hp-section { text-align: center; background: #fff5f5; border: 2px solid #ff4d4d; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .hp-display { font-size: 2em; font-weight: bold; color: #d32f2f; margin-bottom: 10px; }
        
        .clo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f0f7ff; padding: 10px; border-radius: 8px; border: 1px solid #007bff; }
        .clo-item { background: white; padding: 8px; border-radius: 4px; border: 1px solid #cfe2ff; font-size: 0.9em; }
        
        /* アイテム・ストレージ関連スタイル */
        .item-section { background: #fefefe; border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .storage-group { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; }
        .item-row { display: flex; gap: 5px; margin-bottom: 8px; align-items: flex-start; }
        .item-textarea { flex-grow: 1; border: 1px solid #ccc; border-radius: 4px; padding: 6px; font-family: inherit; resize: vertical; min-height: 2.4em; font-size: 0.9em; }
        
        .desc-text { color: #777; font-style: italic; margin-top: 5px; white-space: pre-wrap; word-wrap: break-word; border-left: 3px solid #ddd; padding-left: 10px; font-size: 0.9em; }
        
        button { cursor: pointer; padding: 6px 12px; border-radius: 4px; border: 1px solid #ccc; background: #fff; transition: 0.1s; }
        button:active { transform: translateY(2px); }
        button.active { background: #007bff; color: white; border-color: #0056b3; }
        button.save { background: #28a745; color: white; border-color: #1e7e34; margin-top: 20px; width: 100%; font-weight: bold; font-size: 1.1em; }
        button.add { background: #6c757d; color: white; border-color: #545b62; font-size: 0.7em; margin-top: 5px; }
        button.del { background: #dc3545; color: white; border-color: #bd2130; padding: 4px 8px; }
        .num-input { width: 60px; text-align: center; font-size: 1.1em; border: 1px solid #999; border-radius: 4px; }
        h4 { margin: 10px 0 5px 0; color: #555; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>Multi-System Character Manager</h2>
    <div style="margin-bottom: 10px;">
        <input type="file" id="fileInput" accept=".json">
        <button onclick="createNewCharacter()" style="font-size: 0.8em;">新規作成</button>
    </div>
    
    <div id="characterView" style="display:none;">
        <hr>
        <div class="char-header">
            <img id="displayImg" src="" class="char-image" style="display:none;">
            <div class="char-info-text">
                <h1 id="charName" style="margin: 0; font-size: 1.8em;"></h1>
                <div id="charDesc" class="desc-text"></div>
            </div>
            <button onclick="editMeta()" style="font-size: 0.7em; flex-shrink: 0;">基本情報編集</button>
        </div>
        
        <div id="systemButtons" style="margin: 15px 0;"></div>

        <div class="hp-section">
            <div id="holmoeMode" class="mode-selector" style="display:none; margin-bottom:10px;">
                ルール: 
                <button id="mode100" onclick="setHolmoeMax(100)">通常 (100)</button>
                <button id="mode200" onclick="setHolmoeMax(200)">17条 (200)</button>
            </div>
            <div class="hp-display"><span id="curHP">0</span> / <span id="maxHP">0</span></div>
            <button onclick="adjValue('curHP', -1)">-1</button>
            <button onclick="adjValue('curHP', 1)">+1</button>
            <button onclick="resetCurrentHP()" style="margin-left: 15px;">全快</button>
        </div>

        <div class="status-grid" id="baseStats"></div>

        <div class="calc-status-container" id="calcSection">
            <h3>算出ステータス & リソース</h3>
            <div id="calcList"></div>
            <div id="cloContainer" style="display:none; margin-top: 15px;">
                <h4 style="margin-bottom: 8px;">Clothing (CLO) 詳細</h4>
                <div class="clo-grid" id="cloGrid"></div>
            </div>
        </div>

        <div class="item-section">
            <h3 style="margin-top: 0;">所持品管理</h3>
            
            <h4>装備・技能・異能</h4>
            <div id="equipEditor"></div>
            <button class="add" onclick="addItem('equipment')">+ 装備を追加</button>

            <div class="storage-group">
                <h4>バックパック</h4>
                <div id="backpackEditor"></div>
                <button class="add" onclick="addItem('backpack')">+ バックパックに投入</button>
            </div>

            <div class="storage-group">
                <h4>倉庫</h4>
                <div id="warehouseEditor"></div>
                <button class="add" onclick="addItem('warehouse')">+ 倉庫に預ける</button>
            </div>
        </div>

        <button class="save" onclick="exportJSON()">キャラクターを保存 (JSON出力)</button>
    </div>
</div>

<script>
let charData = null;
let currentSystem = "";
let values = {}; 

    function resolveValue(token, base) {
    if (base[token] !== undefined) return base[token];
    if (!isNaN(token)) return parseFloat(token);
    return 0;
}

function evalFormula(expr, base) {
    let result = 0;
    let op = "+";

    for (let token of expr) {
        if (token === "+" || token === "-" || token === "*" || token === "/") {
            op = token;
        } else {
            const val = resolveValue(token, base);

            switch(op) {
                case "+": result += val; break;
                case "-": result -= val; break;
                case "*": result *= val; break;
                case "/": result /= val; break;
            }
        }
    }

    return result;
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = (event) => {
        charData = JSON.parse(event.target.result);
        // storageの初期化保証
        Object.keys(charData.systems_config).forEach(sys => {
            if(!charData.systems_config[sys].storage) {
                charData.systems_config[sys].storage = { backpack: [], warehouse: [] };
            }
        });
        initUI();
    };
    reader.readAsText(e.target.files[0]);
});

function createNewCharacter() {
    charData = {
        "name": "新規キャラ", "description": "説明...", "image_url": "", "origin_system": "未設定",
        "base_stats": { "spade": 7, "diamond": 7, "club": 8, "heart": 8 },
        "systems_config": {
            "テスト用": { "stat_names": { "spade": "ATK", "diamond": "INT", "club": "SPD", "heart": "VIT" }, "equipment": [], "storage": {"backpack":[], "warehouse":[]} }
        }
    };
    initUI();
}

function initUI() {
    document.getElementById('characterView').style.display = 'block';
    document.getElementById('charName').innerText = charData.name;
    document.getElementById('charDesc').innerText = charData.description;
    const imgEl = document.getElementById('displayImg');
    imgEl.src = charData.image_url || "";
    imgEl.style.display = charData.image_url ? 'block' : 'none';

    const btnArea = document.getElementById('systemButtons');
    btnArea.innerHTML = "";
    Object.keys(charData.systems_config).forEach(key => {
        const b = document.createElement('button');
        b.innerText = key;
        b.onclick = () => switchSystem(key);
        b.id = "btn-" + key;
        btnArea.appendChild(b);
    });
    switchSystem(Object.keys(charData.systems_config)[0]);
}

function switchSystem(key) {
    currentSystem = key;
    document.querySelectorAll('#systemButtons button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + key).classList.add('active');

    const config = charData.systems_config[key];
    const base = charData.base_stats;

    const baseGrid = document.getElementById('baseStats');
    baseGrid.innerHTML = `
        <div class="status-item"><span>♠ ${config.stat_names.spade}</span> <input type="number" class="num-input" value="${base.spade}" onchange="updateBaseStat('spade', this.value)"></div>
        <div class="status-item"><span>♦ ${config.stat_names.diamond}</span> <input type="number" class="num-input" value="${base.diamond}" onchange="updateBaseStat('diamond', this.value)"></div>
        <div class="status-item"><span>♣ ${config.stat_names.club}</span> <input type="number" class="num-input" value="${base.club}" onchange="updateBaseStat('club', this.value)"></div>
        <div class="status-item"><span>♥ ${config.stat_names.heart}</span> <input type="number" class="num-input" value="${base.heart}" onchange="updateBaseStat('heart', this.value)"></div>
    `;

    values.maxHP = calcHP(key, base);
    values.curHP = values.maxHP;

    renderCalcStats(key, base, config);
    // 各リストの描画
    renderItemList('equipEditor', config.equipment, 'equipment');
    renderItemList('backpackEditor', config.storage.backpack, 'backpack');
    renderItemList('warehouseEditor', config.storage.warehouse, 'warehouse');
    updateDisplay();
}

// アイテムリスト描画の共通関数
function renderItemList(containerId, array, type) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    array.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = "item-row";
        div.innerHTML = `
            <textarea class="item-textarea" onchange="updateItem('${type}', ${index}, this.value)">${item}</textarea>
            <button class="del" onclick="removeItem('${type}', ${index})">×</button>
        `;
        container.appendChild(div);
    });
}

function addItem(type) {
    const config = charData.systems_config[currentSystem];
    if (type === 'equipment') config.equipment.push("新規装備");
    else config.storage[type].push("新規アイテム");
    switchSystem(currentSystem); // 再描画
}

function updateItem(type, index, val) {
    const config = charData.systems_config[currentSystem];
    if (type === 'equipment') config.equipment[index] = val;
    else config.storage[type][index] = val;
}

function removeItem(type, index) {
    const config = charData.systems_config[currentSystem];
    if (type === 'equipment') config.equipment.splice(index, 1);
    else config.storage[type].splice(index, 1);
    switchSystem(currentSystem);
}

// 以下、既存ロジック維持
function updateBaseStat(stat, val) {
    charData.base_stats[stat] = parseInt(val);
    values.maxHP = calcHP(currentSystem, charData.base_stats);
    renderCalcStats(currentSystem, charData.base_stats, charData.systems_config[currentSystem]);
    updateDisplay();
}

function calcHP(key, base) {
    const config = charData.systems_config[key];

    // 旧式フォールバック（互換性）
    if (!config.hp_rule) {
        return (base.spade + base.heart);
    }

    if (config.hp_rule.type === "formula") {
        return evalFormula(config.hp_rule.expr, base);
    }

    return 0;
}

function renderCalcStats(key, base, config) {
    const list = document.getElementById('calcList');
    const cloArea = document.getElementById('cloContainer');
    list.innerHTML = "";
    cloArea.style.display = "none";
    addCalcItem("Resource A", (base.spade * 2), true);
}

function addCalcItem(label, maxVal, editable = false, allowNegative = false) {
    const id = `val_${label}`;
    if(!values[id]) values[id] = maxVal;
    const html = `<div class="calc-item"><span>${label}</span><div>${editable ? `<input type="number" class="num-input" id="input_${id}" value="${values[id]}" onchange="updateVal('${id}', this.value, ${allowNegative})">` : `<b>${maxVal}</b>`}${editable ? `<span style="font-size:0.8em; color:#888;"> / ${maxVal}</span>` : ""}</div></div>`;
    document.getElementById('calcList').insertAdjacentHTML('beforeend', html);
}

function updateVal(id, newVal, allowNegative) {
    values[id] = allowNegative ? parseFloat(newVal) : Math.max(0, parseFloat(newVal));
    updateDisplay();
}

function adjValue(id, amount) {
    let next = (values[id] || 0) + amount;
    if(id.startsWith('clo_')) next = Math.max(0, Math.min(1.0, next));
    else if(id === 'curHP') next = Math.max(0, Math.min(values.maxHP, next));
    else if(id !== 'val_DDR') next = Math.max(0, next);
    values[id] = next;
    updateDisplay();
}

function resetCurrentHP() { values.curHP = values.maxHP; updateDisplay(); }

function updateDisplay() {
    document.getElementById('curHP').innerText = values.curHP;
    document.getElementById('maxHP').innerText = values.maxHP;
    for (let key in values) {
        const el = document.getElementById('input_' + key);
        if(el) el.value = values[key];
        const span = document.getElementById('val_' + key);
        if(span) span.innerText = values[key].toFixed(1);
    }
}

function editMeta() {
    const n = prompt("名前:", charData.name); if(!n) return;
    const d = prompt("説明 (\\nで改行):", charData.description.replace(/\n/g, "\\n")); if(!d) return;
    const i = prompt("画像URL:", charData.image_url); if(i===null) return;
    charData.name = n; charData.description = d.replace(/\\n/g, "\n"); charData.image_url = i;
    initUI();
}

function exportJSON() {
    const blob = new Blob([JSON.stringify(charData, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${charData.name}_sheet.json`;
    a.click();
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
